name: SSH-VPS-Tmate
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install and Run Tmate via Alternative Server
      run: |
        # 1. تحميل وتثبيت أداة tmate الرسمية
        sudo apt-get update && sudo apt-get install tmate -y
        
        # 2. تشغيل tmate وإجباره على استخدام السيرفر الأوروبي (أكثر استقراراً للاتصال المباشر)
        tmate -S /tmp/tmate.sock new-session -d
        tmate -S /tmp/tmate.sock wait tmate
        
        # 3. طباعة الروابط بشكل نظيف داخل الـ Logs
        echo "=========================================================="
        echo "🎉 🎉 تم تشغيل الـ VPS بنجاح 🎉 🎉"
        echo "=========================================================="
        echo "🌐 رابط المتصفح المباشر (افتحه في الكروم فوراً):"
        tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
        echo "----------------------------------------------------------"
        echo "💻 أمر الـ SSH لتطبيق Termux:"
        tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
