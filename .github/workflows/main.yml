name: SSH-Ngrok-Termux
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run SSH via Ngrok
      run: |
        # 1. تثبيت وتجهيز خادم SSH
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
        echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
        sudo service ssh restart
        
        # 2. تحميل وتثبيت Ngrok
        wget -q https://bin.equinox.io/c/b3419c4fe1f/ngrok-stable-linux-amd64.zip
        unzip -q ngrok-stable-linux-amd64.zip
        
        # 3. ربط حسابك (ضع التوكن الخاص بك مكان XXXXXXX)
        ./ngrok authtoken 2Km7kgNws0g9aXtH4ZzdxzK6R9Z_2qGLQM9mJNeP5XLBfbTbf
        
        # 4. تشغيل النفق لمنفذ الـ SSH
        ./ngrok tcp 22 > /dev/null &
        sleep 5
        
        # 5. جلب أمر الاتصال المباشر لـ Termux
        echo "=========================================================="
        echo "💻 انسخ الأمر أدناه وضعه في Termux مباشرة:"
        echo "=========================================================="
        curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' | sed 's/tcp:\/\//ssh root@/' | sed 's/:/ -p /'
        echo "=========================================================="
        
        # إبقاء السيرفر يعمل لمدة 6 ساعات
        sleep 21600
