name: SSH-VPS-Cloudflare
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH & Cloudflare Tunnel
      run: |
        # 1. تثبيت الحزم والمحطة
        sudo apt-get update
        sudo apt-get install -y openssh-server
        
        sudo wget -O /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        sudo chmod +x /usr/local/bin/ttyd
        
        # تشغيل ttyd في الخلفية
        ttyd -p 7681 bash &
        
        # 2. تثبيت Cloudflare
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        
        # 3. تشغيل النفق
        cloudflared tunnel --url http://localhost:7681 > cloudflare.log 2>&1 &
        
        # انتظر 15 ثانية كاملة لضمان توليد الرابط من السيرفر بنجاح
        echo "=== جاري الاتصال بخوادم Cloudflare وتوليد الرابط المباشر (انتظر 15 ثانية) ==="
        sleep 15
        
        echo "=========================================================="
        echo "🌐 الرابط المباشر للمتصفح (Web Terminal):"
        echo "=========================================================="
        # طباعة السطر الذي يحتوي على الرابط بدقة
        cat cloudflare.log | grep -o 'https://.*trycloudflare.com' || cat cloudflare.log
        echo "=========================================================="
        
        # إبقاء الجلسة حية
        sleep 21600
