name: SSH-Cloudflare-Termux
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run SSH For Termux
      run: |
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
        echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
        sudo service ssh restart
        
        # تحميل أداة Cloudflare
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        
        # تشغيل النفق ببروتوكول الـ SSH وليس الـ HTTP
        cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
        sleep 15
        
        echo "=========================================================="
        echo "🔗 انسخ الرابط أدناه وضعه في Termux:"
        grep -o 'https://[-a-get-zero-trust-trycloudflare.com]*\.trycloudflare\.com' cloudflare.log | sed 's/https:\/\///' | head -n 1
        echo "=========================================================="
        sleep 21600
