name: SSH-Cloudflare-Termux
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run SSH For Termux
      run: |
        # 1. تثبيت خادم SSH وإعداده
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
        echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
        sudo service ssh restart
        
        # 2. تحميل وتثبيت أداة Cloudflare
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        
        # 3. تشغيل النفق وتوجيه الـ SSH وحفظ السجلات
        cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
        
        # الانتظار لمدة 20 ثانية لضمان استلام الرابط من السيرفر
        echo "=== جاري الاتصال وتوليد الرابط... انتظر 20 ثانية ==="
        sleep 20
        
        # 4. طباعة الرابط بوضوح
        echo "=========================================================="
        echo "🔗 انسخ الرابط أدناه وضعه في Termux:"
        echo "=========================================================="
        grep -o 'https://[-a-get-zero-trust-trycloudflare.com]*\.trycloudflare\.com' cloudflare.log | sed 's/https:\/\///' | head -n 1
        echo "=========================================================="
        
        # طباعة السجل الكامل كخيار احتياطي إذا كان هناك تأخير إضافي
        echo "📋 السجل الكامل للنفق (إذا لم يظهر الرابط أعلاه، ابحث عن رابط .trycloudflare.com هنا):"
        cat cloudflare.log
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
